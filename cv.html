<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Page</title>

  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body{
      background: #12001f;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      font-family: Arial, sans-serif;
    }

    .photo-container{
      width: 100%;
      max-width: 1200px;
      border-radius: 25px;
      overflow: hidden;
      border: 2px solid #a020f0;
      box-shadow: 0 0 20px rgba(160, 32, 240, 0.4);
    }

    .photo-container img{
      width: 100%;
      display: block;
      object-fit: cover;
    }
  </style>
</head>
<body>

  <div class="photo-container">
    <img src="asset/CV.png" alt="Portfolio">
  </div>

</body>
</html>
